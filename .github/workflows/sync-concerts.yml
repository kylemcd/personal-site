name: Sync Concerts

on:
  schedule:
    # Mondays at 14:00 UTC (~9am Central). Weekly is plenty for concert cadence.
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-concerts:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run scraper in diff mode
        run: node scripts/scrape-setlist-profile.mjs --diff

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          if git diff --quiet -- content/concerts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new concerts to sync."
          else
            added=$(git diff --shortstat -- content/concerts.json)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Diff: $added"
          fi

      - name: Open pull request
        if: steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync concerts from setlist.fm profile"
          title: "Sync concerts from setlist.fm"
          body: |
            Auto-generated by `.github/workflows/sync-concerts.yml`.

            Ran `node scripts/scrape-setlist-profile.mjs --diff`, which walks the public setlist.fm profile and appends any setlists not already in `content/concerts.json`.

            Review the diff and merge if it looks right. If something's wrong with a specific entry, fix it in this branch (or close the PR and run `/add-concert <url>` locally with the correct URL).
          branch: chore/sync-concerts
          delete-branch: true
          labels: data-sync
